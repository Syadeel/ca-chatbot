<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Bot — The Capital Acquisition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .card-glow { box-shadow: 0 0 40px rgba(59,130,246,0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-black rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white text-2xl font-bold">CA</span>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">CA Bot Manager</h1>
                <p class="text-slate-500 mt-1">Manage your AI chatbot knowledge base</p>
            </div>

            <!-- Login Card -->
            <div class="bg-white rounded-2xl p-8 card-glow">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Your Tenant ID</label>
                    <input type="text" id="tenant-input" placeholder="Paste your Tenant ID here"
                           class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-black focus:border-black outline-none transition">
                </div>
                <button onclick="login()" 
                        class="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-slate-800 transition">
                    Access Dashboard →
                </button>
                <p class="text-xs text-slate-400 text-center mt-4">
                    Don't have a Tenant ID? 
                    <a href="mailto:hello@thecapitalacquisition.com" class="text-black underline">Contact us</a>
                </p>
            </div>

            <!-- Footer -->
            <p class="text-center text-xs text-slate-400 mt-8">
                Powered by <a href="https://thecapitalacquisition.com" class="underline">The Capital Acquisition</a>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hrzyuchlqihbdllbcxlh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyenl1Y2hscWloYmRsbGJjeGxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODMwNDUsImV4cCI6MjA5NDk1OTA0NX0.ZwQBHdjGONC_cjk2hSgubp5wW1dcTPy3P7rfILr9Uc4';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const tid = document.getElementById('tenant-input').value.trim();
            if (!tid) return alert('Enter your Tenant ID');
            
            const { data, error } = await db.from('tenants').select('*').eq('id', tid).single();
            if (error || !data) return alert('Tenant not found. Check your ID.');
            
            // Save tenant ID and redirect
            localStorage.setItem('ca_tenant_id', tid);
            window.location.href = '/dashboard.html';
        }

        // Auto-login if tenant ID is in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tenant')) {
            document.getElementById('tenant-input').value = urlParams.get('tenant');
            login();
        }
    </script>
</body>
</html>
