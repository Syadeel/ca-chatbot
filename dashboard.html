<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — CA Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center"><span class="text-white text-xs font-bold">CA</span></div>
            <span class="font-semibold" id="nav-title">Loading...</span>
        </div>
        <button onclick="logout()" class="text-sm text-slate-500 hover:text-black transition">Logout</button>
    </nav>

    <div class="max-w-5xl mx-auto p-6">
        <!-- Tabs -->
        <div class="flex gap-2 mb-6 overflow-x-auto">
            <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium bg-black text-white" data-tab="business">🏪 Business</button>
            <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium bg-white text-slate-600 hover:bg-slate-100" data-tab="faq">❓ FAQ</button>
            <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium bg-white text-slate-600 hover:bg-slate-100" data-tab="products">📦 Products</button>
            <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium bg-white text-slate-600 hover:bg-slate-100" data-tab="embed">🔌 Embed</button>
            <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium bg-white text-slate-600 hover:bg-slate-100" data-tab="chats">💬 Chats</button>
        </div>

        <!-- Business Tab -->
        <div id="tab-business" class="tab-content bg-white rounded-2xl p-8">
            <h2 class="text-lg font-bold mb-6">Business Information</h2>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-sm font-medium text-slate-600">Business Name</label><input id="f-name" class="w-full mt-1 px-4 py-2.5 border rounded-xl"></div>
                <div><label class="text-sm font-medium text-slate-600">Brand Color</label><input id="f-color" type="color" class="w-full mt-1 h-11 border rounded-xl"></div>
                <div class="col-span-2"><label class="text-sm font-medium text-slate-600">Description</label><textarea id="f-desc" class="w-full mt-1 px-4 py-2.5 border rounded-xl h-24"></textarea></div>
                <div><label class="text-sm font-medium text-slate-600">Hours</label><input id="f-hours" class="w-full mt-1 px-4 py-2.5 border rounded-xl"></div>
                <div><label class="text-sm font-medium text-slate-600">Website</label><input id="f-domain" class="w-full mt-1 px-4 py-2.5 border rounded-xl"></div>
                <div class="col-span-2"><label class="text-sm font-medium text-slate-600">Bot Instructions</label><textarea id="f-instructions" class="w-full mt-1 px-4 py-2.5 border rounded-xl h-20"></textarea></div>
            </div>
            <button onclick="saveBusiness()" class="mt-6 bg-black text-white px-6 py-2.5 rounded-xl font-medium hover:bg-slate-800">💾 Save</button>
        </div>

        <!-- FAQ Tab -->
        <div id="tab-faq" class="tab-content hidden bg-white rounded-2xl p-8">
            <h2 class="text-lg font-bold mb-4">FAQ Knowledge Base</h2>
            <div class="bg-slate-50 p-4 rounded-xl mb-6">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2"><input id="faq-q" placeholder="Question" class="w-full px-4 py-2.5 border rounded-xl"></div>
                    <div class="col-span-2"><textarea id="faq-a" placeholder="Answer" class="w-full px-4 py-2.5 border rounded-xl h-20"></textarea></div>
                </div>
                <button onclick="addFaq()" class="mt-3 bg-black text-white px-4 py-2 rounded-xl text-sm font-medium">+ Add FAQ</button>
            </div>
            <div id="faq-list"></div>
        </div>

        <!-- Products Tab -->
        <div id="tab-products" class="tab-content hidden bg-white rounded-2xl p-8">
            <h2 class="text-lg font-bold mb-4">Products</h2>
            <div class="bg-slate-50 p-4 rounded-xl mb-6">
                <div class="grid grid-cols-2 gap-3">
                    <div><input id="p-name" placeholder="Product name" class="w-full px-4 py-2.5 border rounded-xl"></div>
                    <div><input id="p-price" type="number" placeholder="Price" class="w-full px-4 py-2.5 border rounded-xl"></div>
                    <div class="col-span-2"><textarea id="p-desc" placeholder="Description" class="w-full px-4 py-2.5 border rounded-xl h-16"></textarea></div>
                </div>
                <button onclick="addProduct()" class="mt-3 bg-black text-white px-4 py-2 rounded-xl text-sm font-medium">+ Add Product</button>
            </div>
            <div id="product-list"></div>
        </div>

        <!-- Embed Tab -->
        <div id="tab-embed" class="tab-content hidden bg-white rounded-2xl p-8">
            <h2 class="text-lg font-bold mb-2">Install on Your Website</h2>
            <p class="text-slate-500 text-sm mb-4">Add this to your site (just before &lt;/body&gt;):</p>
            <div class="bg-slate-900 text-green-400 p-4 rounded-xl text-sm font-mono overflow-x-auto" id="embed-code">Loading...</div>
            <button onclick="copyEmbed()" class="mt-3 bg-black text-white px-4 py-2 rounded-xl text-sm">📋 Copy</button>
        </div>

        <!-- Chats Tab -->
        <div id="tab-chats" class="tab-content hidden bg-white rounded-2xl p-8">
            <h2 class="text-lg font-bold mb-4">Recent Conversations</h2>
            <div id="chat-list"><p class="text-slate-400">Loading...</p></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hrzyuchlqihbdllbcxlh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyenl1Y2hscWloYmRsbGJjeGxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODMwNDUsImV4cCI6MjA5NDk1OTA0NX0.ZwQBHdjGONC_cjk2hSgubp5wW1dcTPy3P7rfILr9Uc4';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let tenantId = localStorage.getItem('ca_tenant_id');
        let tenant = null;
        if (!tenantId) window.location.href = '/';

        // Load tenant
        async function load() {
            const { data } = await db.from('tenants').select('*').eq('id', tenantId).single();
            tenant = data;
            document.getElementById('nav-title').textContent = '🤖 ' + data.business_name;
            document.getElementById('f-name').value = data.business_name || '';
            document.getElementById('f-color').value = data.brand_color || '#000000';
            document.getElementById('f-desc').value = data.description || '';
            document.getElementById('f-hours').value = data.hours || '';
            document.getElementById('f-domain').value = data.domain || '';
            document.getElementById('f-instructions').value = data.custom_instructions || '';
            renderEmbed();
        }
        load();

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.tab-btn').forEach(b => { b.className = b.className.replace('bg-black text-white', 'bg-white text-slate-600 hover:bg-slate-100'); });
                this.className = this.className.replace('bg-white text-slate-600 hover:bg-slate-100', 'bg-black text-white');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                document.getElementById('tab-' + this.dataset.tab).classList.remove('hidden');
                if (this.dataset.tab === 'faq') loadFaq();
                if (this.dataset.tab === 'products') loadProducts();
                if (this.dataset.tab === 'chats') loadChats();
            };
        });

        // Save business
        async function saveBusiness() {
            const data = {
                business_name: document.getElementById('f-name').value,
                brand_color: document.getElementById('f-color').value,
                description: document.getElementById('f-desc').value,
                hours: document.getElementById('f-hours').value,
                domain: document.getElementById('f-domain').value,
                custom_instructions: document.getElementById('f-instructions').value
            };
            const { error } = await db.from('tenants').update(data).eq('id', tenantId);
            if (!error) { document.getElementById('nav-title').textContent = '🤖 ' + data.business_name; alert('✅ Saved!'); }
        }

        // FAQ
        async function loadFaq() {
            const { data } = await db.from('faq').select('*').eq('tenant_id', tenantId).order('sort_order');
            const el = document.getElementById('faq-list');
            if (!data || !data.length) { el.innerHTML = '<p class="text-slate-400 text-center py-8">No FAQ yet. Add your first one!</p>'; return; }
            el.innerHTML = data.map(f => `<div class="bg-slate-50 p-4 rounded-xl mb-3 flex justify-between items-start"><div><strong>${f.question}</strong><p class="text-sm text-slate-500 mt-1">${f.answer}</p></div><button onclick="deleteFaq('${f.id}')" class="text-red-500 text-sm hover:text-red-700">Delete</button></div>`).join('');
        }
        async function addFaq() {
            const q = document.getElementById('faq-q').value.trim();
            const a = document.getElementById('faq-a').value.trim();
            if (!q || !a) return alert('Enter both Q and A');
            await db.from('faq').insert({ tenant_id: tenantId, question: q, answer: a });
            document.getElementById('faq-q').value = ''; document.getElementById('faq-a').value = '';
            loadFaq();
        }
        async function deleteFaq(id) { await db.from('faq').delete().eq('id', id); loadFaq(); }

        // Products
        async function loadProducts() {
            const { data } = await db.from('chatbot_products').select('*').eq('tenant_id', tenantId).order('created_at', { ascending: false });
            const el = document.getElementById('product-list');
            if (!data || !data.length) { el.innerHTML = '<p class="text-slate-400 text-center py-8">No products yet.</p>'; return; }
            el.innerHTML = data.map(p => `<div class="bg-slate-50 p-4 rounded-xl mb-3 flex justify-between items-start"><div><strong>${p.name}</strong> ${p.price ? '<span class="text-black font-bold">— $' + p.price + '</span>' : ''}<p class="text-sm text-slate-500 mt-1">${p.description || ''}</p></div><button onclick="deleteProduct('${p.id}')" class="text-red-500 text-sm">Delete</button></div>`).join('');
        }
        async function addProduct() {
            const n = document.getElementById('p-name').value.trim();
            if (!n) return alert('Enter product name');
            await db.from('chatbot_products').insert({ tenant_id: tenantId, name: n, price: parseFloat(document.getElementById('p-price').value) || null, description: document.getElementById('p-desc').value.trim() });
            document.getElementById('p-name').value = ''; document.getElementById('p-price').value = ''; document.getElementById('p-desc').value = '';
            loadProducts();
        }
        async function deleteProduct(id) { await db.from('chatbot_products').delete().eq('id', id); loadProducts(); }

        // Embed
        function renderEmbed() {
            const domain = window.location.origin;
            document.getElementById('embed-code').textContent = `<script src="${domain}/embed/embed.js" data-tenant="${tenantId}" data-color="${tenant?.brand_color || '#000000'}"><\/script>`;
        }
        function copyEmbed() { navigator.clipboard.writeText(document.getElementById('embed-code').textContent); alert('✅ Copied!'); }

        // Chats
        async function loadChats() {
            const { data: sessions } = await db.from('chat_sessions').select('*').eq('tenant_id', tenantId).order('last_message_at', { ascending: false }).limit(10);
            const el = document.getElementById('chat-list');
            if (!sessions || !sessions.length) { el.innerHTML = '<p class="text-slate-400 text-center py-8">No conversations yet.</p>'; return; }
            let html = '';
            for (const s of sessions) {
                const { data: msgs } = await db.from('chat_history').select('role, message').eq('session_id', s.session_id).order('created_at', { ascending: false }).limit(3);
                html += `<div class="bg-slate-50 p-4 rounded-xl mb-3"><div class="flex justify-between"><strong>${s.visitor_name || 'Anonymous'}</strong><span class="text-xs text-slate-400">${new Date(s.last_message_at).toLocaleString()}</span></div>${(msgs||[]).reverse().map(m => `<p class="text-sm mt-1"><span class="font-medium">${m.role === 'user' ? 'Visitor' : 'Bot'}:</span> ${m.message.substring(0,100)}</p>`).join('')}</div>`;
            }
            el.innerHTML = html;
        }

        function logout() { localStorage.removeItem('ca_tenant_id'); window.location.href = '/'; }
    </script>
</body>
</html>
